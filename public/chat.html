<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta
      name="theme-color"
      content="#212121"
      media="(prefers-color-scheme: dark)"
    />
    <meta
      name="theme-color"
      content="#ffffff"
      media="(prefers-color-scheme: light)"
    />
    <meta name="description" content="Vixy-AI — Chat with your AI assistant" />
    <title>Vixy-AI — Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="js/theme.js"></script>
    <link rel="stylesheet" href="styles/chat.css" />
  </head>
  <body>
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <div class="logo-icon">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path
                stroke-width="2"
                d="M12 2a10 10 0 100 20A10 10 0 0012 2zm0 0v20M2 12h20"
              />
            </svg>
          </div>
          Vixy-AI
        </div>
        <button
          class="new-chat-btn"
          onclick="newChat()"
          title="New chat"
          id="newChatBtn"
        >
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-width="2" d="M12 5v14M5 12h14" />
          </svg>
        </button>
      </div>

      <div class="sidebar-nav-section">
        <div class="nav-section-label">Navigation</div>
        <a href="/dashboard.html" class="nav-link">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <rect x="3" y="3" width="7" height="7" rx="1" stroke-width="2" />
            <rect x="14" y="3" width="7" height="7" rx="1" stroke-width="2" />
            <rect x="3" y="14" width="7" height="7" rx="1" stroke-width="2" />
            <rect x="14" y="14" width="7" height="7" rx="1" stroke-width="2" />
          </svg>
          Dashboard
        </a>
        <a href="/chat.html" class="nav-link active">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-width="2"
              d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"
            />
          </svg>
          New Chat
        </a>
        <a href="/settings.html" class="nav-link">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="3" stroke-width="2" />
            <path
              stroke-width="2"
              d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"
            />
          </svg>
          Settings
        </a>

        <div class="nav-section-label" style="margin-top: 16px">
          Recent Chats
        </div>
        <div id="chatHistoryList"></div>
      </div>

      <div class="sidebar-footer">
        <div
          class="user-menu"
          onclick="window.location.href = '/settings.html'"
        >
          <div class="user-avatar" id="sidebarAvatar">U</div>
          <div class="user-info">
            <div class="user-name" id="sidebarName">Loading...</div>
            <div class="user-email" id="sidebarEmail">—</div>
          </div>
        </div>
      </div>
    </aside>

    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
    <div class="chat-wrap">
      <header class="chat-header">
        <div style="display: flex; align-items: center">
          <button class="mobile-toggle" onclick="toggleSidebar()">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M4 6h16M4 12h16M4 18h16"
              />
            </svg>
          </button>
          <button class="model-selector" id="modelSelector">
            Vixy-VY01u
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <polyline stroke-width="2" points="6 9 12 15 18 9" />
            </svg>
          </button>
        </div>
        <div class="header-actions">
          <div class="badge" id="statusBadge">
            <span class="dot"></span>
            Online
          </div>
        </div>
      </header>

      <div class="chat-messages" id="chatBox">
        <div class="empty-state" id="emptyState">
          <div class="empty-logo">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path
                stroke-width="2"
                d="M12 2a10 10 0 100 20A10 10 0 0012 2zm0 0v20M2 12h20"
              />
            </svg>
          </div>
          <h1 class="empty-title">How can I help you?</h1>
          <p class="empty-sub">
            Ask me anything — I'm Vixy, your AI assistant.
          </p>
          <div class="suggestions-grid">
            <button
              class="suggestion-card"
              onclick="
                useSuggestion('Explain quantum computing in simple terms')
              "
            >
              <span class="suggestion-icon"><i data-lucide="zap"></i></span>
              <div class="suggestion-title">Explain a concept</div>
              <div class="suggestion-desc">
                Explain quantum computing simply
              </div>
            </button>
            <button
              class="suggestion-card"
              onclick="
                useSuggestion('Help me write a professional email to my team')
              "
            >
              <span class="suggestion-icon"
                ><i data-lucide="pen-tool"></i
              ></span>
              <div class="suggestion-title">Help me write</div>
              <div class="suggestion-desc">Draft a professional email</div>
            </button>
            <button
              class="suggestion-card"
              onclick="
                useSuggestion(
                  'Write a Python function to sort a list of dictionaries',
                )
              "
            >
              <span class="suggestion-icon"><i data-lucide="code"></i></span>
              <div class="suggestion-title">Code something</div>
              <div class="suggestion-desc">Python function to sort data</div>
            </button>
            <button
              class="suggestion-card"
              onclick="
                useSuggestion(
                  'What are the best productivity tips for developers?',
                )
              "
            >
              <span class="suggestion-icon"><i data-lucide="rocket"></i></span>
              <div class="suggestion-title">Get advice</div>
              <div class="suggestion-desc">
                Productivity tips for developers
              </div>
            </button>
          </div>
        </div>
      </div>

      <div class="chat-input-wrapper">
        <div class="file-preview-bar" id="filePreviewBar">
          <div id="filePreviewThumb"></div>
          <div class="file-preview-info">
            <div class="file-preview-name" id="filePreviewName"></div>
            <div class="file-preview-size" id="filePreviewSize"></div>
          </div>
          <button
            class="file-remove-btn"
            onclick="removeAttachment()"
            title="Remove file"
          >
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <line
                x1="18"
                y1="6"
                x2="6"
                y2="18"
                stroke-width="2"
                stroke-linecap="round"
              />
              <line
                x1="6"
                y1="6"
                x2="18"
                y2="18"
                stroke-width="2"
                stroke-linecap="round"
              />
            </svg>
          </button>
        </div>

        <div class="input-container" id="inputContainer">
          <input
            type="file"
            id="fileInput"
            style="display: none"
            accept="image/*,.pdf,.txt,.html,.css,.js,.py,.json"
            onchange="handleFileSelect(this)"
          />
          <textarea
            id="msgInput"
            rows="1"
            placeholder="Message Vixy..."
            onkeydown="handleKey(event)"
            oninput="autoResize(this)"
          ></textarea>
          <div class="input-actions">
            <button
              class="attach-btn"
              id="attachBtn"
              onclick="document.getElementById('fileInput').click()"
              title="Attach image or file"
            >
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path
                  stroke-width="2"
                  stroke-linecap="round"
                  d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"
                />
              </svg>
            </button>
            <button
              class="img-gen-btn"
              id="imgGenBtn"
              onclick="openImageModal()"
              title="Generate image with AI"
            >
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <rect
                  x="3"
                  y="3"
                  width="18"
                  height="18"
                  rx="3"
                  stroke-width="2"
                />
                <circle cx="8.5" cy="8.5" r="1.5" stroke-width="2" />
                <polyline stroke-width="2" points="21 15 16 10 5 21" />
              </svg>
            </button>
            <button
              class="stop-btn"
              id="stopBtn"
              onclick="stopGeneration()"
              title="Stop generating"
            >
              <svg fill="currentColor" viewBox="0 0 24 24">
                <rect x="6" y="6" width="12" height="12" rx="2" />
              </svg>
            </button>
            <button
              class="send-btn"
              id="sendBtn"
              onclick="send()"
              title="Send message"
              disabled
            >
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <line x1="12" y1="19" x2="12" y2="5" stroke-width="2.5" />
                <polyline stroke-width="2.5" points="5 12 12 5 19 12" />
              </svg>
            </button>
          </div>
        </div>
        <div class="input-footer">
          Vixy-AI may make mistakes. Always verify important info.
        </div>
      </div>
    </div>

    <div
      class="img-modal-backdrop"
      id="imgModalBackdrop"
      onclick="closeImageModalOnBackdrop(event)"
    >
      <div class="img-modal">
        <div class="img-modal-title">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="3" stroke-width="2" />
            <circle cx="8.5" cy="8.5" r="1.5" stroke-width="2" />
            <polyline stroke-width="2" points="21 15 16 10 5 21" />
          </svg>
          Generate Image
        </div>
        <p class="img-modal-sub">
          Deskripsikan gambar yang ingin kamu buat dengan Vixy AI
        </p>

        <label for="imgPromptInput">Prompt</label>
        <textarea
          id="imgPromptInput"
          placeholder="e.g. A futuristic city at sunset, photorealistic, 8K..."
          rows="3"
        ></textarea>

        <label style="margin-top: 16px; display: block">Aspect Ratio</label>
        <div class="img-aspect-options" id="aspectOptions">
          <button
            class="aspect-chip active"
            data-ratio="1:1"
            onclick="selectAspect(this)"
          >
            1:1 Square
          </button>
          <button
            class="aspect-chip"
            data-ratio="16:9"
            onclick="selectAspect(this)"
          >
            16:9 Wide
          </button>
          <button
            class="aspect-chip"
            data-ratio="9:16"
            onclick="selectAspect(this)"
          >
            9:16 Portrait
          </button>
          <button
            class="aspect-chip"
            data-ratio="4:3"
            onclick="selectAspect(this)"
          >
            4:3
          </button>
          <button
            class="aspect-chip"
            data-ratio="3:4"
            onclick="selectAspect(this)"
          >
            3:4
          </button>
        </div>

        <div class="img-modal-actions">
          <button class="img-cancel-btn" onclick="closeImageModal()">
            Cancel
          </button>
          <button
            class="img-generate-btn"
            id="imgGenerateBtn"
            onclick="generateImage()"
          >
            <div class="img-spinner" id="imgSpinner"></div>
            <svg
              class="btn-icon"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path stroke-width="2" d="M5 3l14 9-14 9V3z" />
            </svg>
            Generate
          </button>
        </div>
      </div>
    </div>

    <div class="img-lightbox" id="imgLightbox" onclick="closeLightbox()">
      <button class="img-lightbox-close" onclick="closeLightbox()">✕</button>
      <img id="lightboxImg" src="" alt="Generated Image" />
      <a class="img-lightbox-dl" id="lightboxDl" download="vixy-generated.png">
        <svg
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
          style="width: 14px; height: 14px"
        >
          <path stroke-width="2" d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" />
          <polyline stroke-width="2" points="7 10 12 15 17 10" />
          <line x1="12" y1="15" x2="12" y2="3" stroke-width="2" />
        </svg>
        Download
      </a>
    </div>

    <script src="/js/chat.js"></script>
  </body>
</html>
