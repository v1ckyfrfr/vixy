<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Vixy-AI — Chat with your AI assistant" />
    <title>Vixy-AI — Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="js/theme.js"></script>
    <style>
      body {
        display: flex;
        height: 100vh;
        overflow: hidden;
      }

      .sidebar-nav-section {
        padding: 4px 8px;
      }

      .chat-wrap {
        margin-left: var(--sidebar-w);
        display: flex;
        flex-direction: column;
        height: 100vh;
        flex: 1;
        background: var(--bg);
        min-width: 0;
      }

      .chat-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 20px;
        border-bottom: 1px solid var(--border-subtle);
        background: var(--bg);
        flex-shrink: 0;
      }

      .model-selector {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        border-radius: 8px;
        background: transparent;
        border: 1px solid transparent;
        cursor: pointer;
        font-family: var(--font-sans);
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--text);
        transition:
          background 0.15s,
          border-color 0.15s;
      }

      .model-selector:hover {
        background: var(--surface-hover);
        border-color: var(--border);
      }

      .model-selector svg {
        width: 14px;
        height: 14px;
        color: var(--text-muted);
      }

      .header-actions {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .icon-btn {
        width: 32px;
        height: 32px;
        background: transparent;
        border: none;
        border-radius: var(--radius-sm);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        color: var(--text-muted);
        transition:
          background 0.15s,
          color 0.15s;
      }

      .icon-btn:hover {
        background: var(--surface-hover);
        color: var(--text);
      }
      .icon-btn svg {
        width: 16px;
        height: 16px;
      }

      .chat-messages {
        flex: 1;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        padding-bottom: 16px;
      }

      .empty-state {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
        text-align: center;
      }

      .empty-logo {
        width: 52px;
        height: 52px;
        background: var(--accent);
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 20px;
      }

      .empty-logo svg {
        width: 28px;
        height: 28px;
        color: #fff;
      }

      .empty-title {
        font-size: 1.6rem;
        font-weight: 700;
        letter-spacing: -0.03em;
        color: var(--text);
        margin-bottom: 8px;
      }

      .empty-sub {
        font-size: 0.9rem;
        color: var(--text-muted);
        margin-bottom: 28px;
        max-width: 380px;
      }

      /* Suggestion grid */
      .suggestions-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
        width: 100%;
        max-width: 560px;
      }

      .suggestion-card {
        padding: 14px 16px;
        background: var(--surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius);
        font-size: 0.84rem;
        color: var(--text-dim);
        cursor: pointer;
        transition:
          border-color 0.15s,
          background 0.15s,
          color 0.15s;
        text-align: left;
        line-height: 1.4;
      }

      .suggestion-card:hover {
        border-color: var(--border);
        background: var(--surface-2);
        color: var(--text);
      }

      .suggestion-card .suggestion-icon {
        font-size: 1.1rem;
        margin-bottom: 6px;
        display: block;
      }

      .suggestion-card .suggestion-title {
        font-weight: 500;
        color: var(--text);
        margin-bottom: 2px;
        font-size: 0.85rem;
      }

      .suggestion-card .suggestion-desc {
        color: var(--text-muted);
        font-size: 0.78rem;
      }

      .msg-group {
        padding: 20px 0;
        border-bottom: none;
      }

      .msg-group:hover .msg-actions {
        opacity: 1;
      }

      /* User message */
      .msg-user {
        display: flex;
        justify-content: flex-end;
        padding: 0 20px;
        margin-bottom: 4px;
      }

      .msg-user-bubble {
        max-width: 70%;
        padding: 12px 16px;
        background: var(--surface-2);
        border-radius: 18px 18px 4px 18px;
        font-size: 0.9rem;
        line-height: 1.6;
        color: var(--text);
        word-break: break-word;
      }

      /* AI message */
      .msg-ai {
        display: flex;
        gap: 12px;
        padding: 0 20px;
        align-items: flex-start;
      }

      .ai-avatar {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: var(--accent);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        margin-top: 2px;
      }

      .ai-avatar svg {
        width: 16px;
        height: 16px;
        color: #fff;
      }

      .ai-content {
        flex: 1;
        min-width: 0;
      }

      .ai-name {
        font-size: 0.82rem;
        font-weight: 600;
        color: var(--text-dim);
        margin-bottom: 4px;
      }

      .ai-bubble {
        font-size: 0.9rem;
        line-height: 1.7;
        color: var(--text);
        word-break: break-word;
      }

      /* Code blocks in AI response */
      .ai-bubble code {
        font-family: var(--font-mono);
        font-size: 0.82em;
        background: var(--surface-2);
        border: 1px solid var(--border-subtle);
        border-radius: 4px;
        padding: 1px 5px;
      }

      .ai-bubble pre {
        background: var(--surface-2);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        padding: 14px;
        margin: 10px 0;
        overflow-x: auto;
      }

      .ai-bubble pre code {
        background: none;
        border: none;
        padding: 0;
        font-size: 0.85em;
      }

      /* Message actions */
      .msg-actions {
        display: flex;
        gap: 4px;
        margin-top: 8px;
        opacity: 0;
        transition: opacity 0.15s;
      }

      .msg-action-btn {
        display: flex;
        align-items: center;
        gap: 5px;
        padding: 4px 8px;
        background: transparent;
        border: none;
        border-radius: var(--radius-xs);
        font-size: 0.75rem;
        color: var(--text-muted);
        cursor: pointer;
        transition:
          background 0.15s,
          color 0.15s;
        font-family: var(--font-sans);
      }

      .msg-action-btn:hover {
        background: var(--surface-hover);
        color: var(--text-dim);
      }
      .msg-action-btn svg {
        width: 13px;
        height: 13px;
      }

      .typing-indicator {
        display: flex;
        gap: 12px;
        padding: 16px 20px;
        align-items: flex-start;
      }

      .typing-dots {
        display: flex;
        align-items: center;
        gap: 3px;
        padding: 8px 0;
      }

      .typing-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--text-muted);
        animation: typing-bounce 1.4s ease-in-out infinite;
      }

      .typing-dot:nth-child(2) {
        animation-delay: 0.2s;
      }
      .typing-dot:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes typing-bounce {
        0%,
        60%,
        100% {
          transform: translateY(0);
          opacity: 0.6;
        }
        30% {
          transform: translateY(-5px);
          opacity: 1;
        }
      }

      .chat-input-wrapper {
        padding: 0 20px 20px;
        flex-shrink: 0;
      }

      .input-container {
        max-width: 720px;
        margin: 0 auto;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-xl);
        padding: 8px 8px 8px 16px;
        display: flex;
        align-items: flex-end;
        gap: 8px;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
      }

      .input-container:focus-within {
        border-color: rgba(255, 255, 255, 0.15);
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.25);
      }

      #msgInput {
        flex: 1;
        background: none;
        border: none;
        outline: none;
        color: var(--text);
        font-family: var(--font-sans);
        font-size: 0.95rem;
        resize: none;
        max-height: 160px;
        min-height: 26px;
        line-height: 1.55;
        padding: 4px 0;
      }

      #msgInput::placeholder {
        color: var(--text-muted);
      }

      .input-actions {
        display: flex;
        align-items: flex-end;
        gap: 2px;
        flex-shrink: 0;
      }

      .send-btn {
        width: 36px;
        height: 36px;
        background: var(--accent);
        border: none;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        flex-shrink: 0;
        transition:
          background 0.15s,
          transform 0.1s,
          opacity 0.15s;
      }

      .send-btn:hover {
        background: var(--accent-dim);
      }
      .send-btn:active {
        transform: scale(0.94);
      }
      .send-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none;
      }
      .send-btn svg {
        width: 16px;
        height: 16px;
        color: #fff;
      }

      .stop-btn {
        width: 36px;
        height: 36px;
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: 10px;
        display: none;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        flex-shrink: 0;
        transition: background 0.15s;
        color: var(--text-dim);
      }

      .stop-btn:hover {
        background: var(--surface-3);
        color: var(--text);
      }
      .stop-btn svg {
        width: 14px;
        height: 14px;
      }
      .stop-btn.visible {
        display: flex;
      }

      .input-footer {
        text-align: center;
        font-size: 0.72rem;
        color: var(--text-muted);
        margin-top: 10px;
        max-width: 720px;
        margin-left: auto;
        margin-right: auto;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .msg-group {
        animation: fadeUp 0.2s ease;
      }
    </style>
  </head>
  <body>
    <aside class="sidebar">
      <!-- Header -->
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <div class="logo-icon">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path
                stroke-width="2"
                d="M12 2a10 10 0 100 20A10 10 0 0012 2zm0 0v20M2 12h20"
              />
            </svg>
          </div>
          Vixy-AI
        </div>
        <button
          class="new-chat-btn"
          onclick="newChat()"
          title="New chat"
          id="newChatBtn"
        >
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-width="2" d="M12 5v14M5 12h14" />
          </svg>
        </button>
      </div>

      <!-- Nav -->
      <div class="sidebar-nav-section">
        <div class="nav-section-label">Navigation</div>
        <a href="/dashboard.html" class="nav-link">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <rect x="3" y="3" width="7" height="7" rx="1" stroke-width="2" />
            <rect x="14" y="3" width="7" height="7" rx="1" stroke-width="2" />
            <rect x="3" y="14" width="7" height="7" rx="1" stroke-width="2" />
            <rect x="14" y="14" width="7" height="7" rx="1" stroke-width="2" />
          </svg>
          Dashboard
        </a>
        <a href="/chat.html" class="nav-link active">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-width="2"
              d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"
            />
          </svg>
          New Chat
        </a>
        <a href="/settings.html" class="nav-link">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="3" stroke-width="2" />
            <path
              stroke-width="2"
              d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"
            />
          </svg>
          Settings
        </a>

        <!-- Recent chats -->
        <div class="nav-section-label" style="margin-top: 16px">
          Recent Chats
        </div>
        <div id="chatHistoryList">
          <!-- filled by JS -->
        </div>
      </div>

      <!-- Footer user -->
      <div class="sidebar-footer">
        <div
          class="user-menu"
          onclick="window.location.href = '/settings.html'"
        >
          <div class="user-avatar" id="sidebarAvatar">U</div>
          <div class="user-info">
            <div class="user-name" id="sidebarName">Loading...</div>
            <div class="user-email" id="sidebarEmail">—</div>
          </div>
        </div>
      </div>
    </aside>

    <div class="chat-wrap">
      <!-- Header -->
      <header class="chat-header">
        <button class="model-selector" id="modelSelector">
          Vixy-VY01u
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <polyline stroke-width="2" points="6 9 12 15 18 9" />
          </svg>
        </button>
        <div class="header-actions">
          <div class="badge" id="statusBadge">
            <span class="dot"></span>
            Online
          </div>
        </div>
      </header>

      <!-- Messages -->
      <div class="chat-messages" id="chatBox">
        <!-- Empty state -->
        <div class="empty-state" id="emptyState">
          <div class="empty-logo">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path
                stroke-width="2"
                d="M12 2a10 10 0 100 20A10 10 0 0012 2zm0 0v20M2 12h20"
              />
            </svg>
          </div>
          <h1 class="empty-title">How can I help you?</h1>
          <p class="empty-sub">
            Ask me anything — I'm Vixy, your AI assistant.
          </p>
          <div class="suggestions-grid">
            <button
              class="suggestion-card"
              onclick="
                useSuggestion('Explain quantum computing in simple terms')
              "
            >
              <span class="suggestion-icon"><i data-lucide="zap"></i></span>
              <div class="suggestion-title">Explain a concept</div>
              <div class="suggestion-desc">
                Explain quantum computing simply
              </div>
            </button>
            <button
              class="suggestion-card"
              onclick="
                useSuggestion('Help me write a professional email to my team')
              "
            >
              <span class="suggestion-icon"
                ><i data-lucide="pen-tool"></i
              ></span>
              <div class="suggestion-title">Help me write</div>
              <div class="suggestion-desc">Draft a professional email</div>
            </button>
            <button
              class="suggestion-card"
              onclick="
                useSuggestion(
                  'Write a Python function to sort a list of dictionaries',
                )
              "
            >
              <span class="suggestion-icon"><i data-lucide="code"></i></span>
              <div class="suggestion-title">Code something</div>
              <div class="suggestion-desc">Python function to sort data</div>
            </button>
            <button
              class="suggestion-card"
              onclick="
                useSuggestion(
                  'What are the best productivity tips for developers?',
                )
              "
            >
              <span class="suggestion-icon"><i data-lucide="rocket"></i></span>
              <div class="suggestion-title">Get advice</div>
              <div class="suggestion-desc">
                Productivity tips for developers
              </div>
            </button>
          </div>
        </div>
      </div>

      <!-- Input area -->
      <div class="chat-input-wrapper">
        <div class="input-container" id="inputContainer">
          <textarea
            id="msgInput"
            rows="1"
            placeholder="Message Vixy..."
            onkeydown="handleKey(event)"
            oninput="autoResize(this)"
          ></textarea>
          <div class="input-actions">
            <button
              class="stop-btn"
              id="stopBtn"
              onclick="stopGeneration()"
              title="Stop generating"
            >
              <svg fill="currentColor" viewBox="0 0 24 24">
                <rect x="6" y="6" width="12" height="12" rx="2" />
              </svg>
            </button>
            <button
              class="send-btn"
              id="sendBtn"
              onclick="send()"
              title="Send message"
              disabled
            >
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <line x1="12" y1="19" x2="12" y2="5" stroke-width="2.5" />
                <polyline stroke-width="2.5" points="5 12 12 5 19 12" />
              </svg>
            </button>
          </div>
        </div>
        <div class="input-footer">
          Vixy-AI may make mistakes. Always verify important info.
        </div>
      </div>
    </div>

    <script src="/js/chat.js"></script>
    <script>
      const token = localStorage.getItem("token");
      if (!token) window.location.href = "/";

      let isGenerating = false;
      let chatHistory = []; // {role, text}[]
      let sessionSaved = false; // only save to Recent Chats on first message of session
      let currentSessionId = null; // ID of the currently active session

      async function loadProfile() {
        try {
          const res = await fetch("/api/auth/profile", {
            headers: { Authorization: `Bearer ${token}` },
          });
          if (res.status === 401 || res.status === 403) {
            logout();
            return;
          }
          if (!res.ok) return;
          const { user } = await res.json();
          if (user) {
            const name = user.username || "User";
            const initial = name.charAt(0).toUpperCase();
            document.getElementById("sidebarAvatar").textContent = initial;
            document.getElementById("sidebarName").textContent = name;
            document.getElementById("sidebarEmail").textContent =
              user.email || "—";
          }
        } catch (e) {}
      }

      loadProfile();

      function renderHistory() {
        const container = document.getElementById("chatHistoryList");
        const sessions = JSON.parse(
          localStorage.getItem("vx_sessions") || "[]",
        );
        if (sessions.length === 0) {
          container.innerHTML =
            '<div style="padding:6px 10px;font-size:0.78rem;color:var(--text-muted)">No past chats yet</div>';
          return;
        }
        container.innerHTML = sessions
          .slice(0, 8)
          .map(
            (s, i) =>
              `<div class="chat-history-item" onclick="loadSession(${i})">
        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="flex-shrink:0">
          <path stroke-width="2" d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
        </svg>
        <span class="chat-history-title">${escapeHtml(s.title)}</span>
      </div>`,
          )
          .join("");
      }

      renderHistory();
      lucide.createIcons();

      function escapeHtml(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function removeEmptyState() {
        document.getElementById("emptyState")?.remove();
      }

      function autoResize(el) {
        el.style.height = "auto";
        el.style.height = Math.min(el.scrollHeight, 160) + "px";
      }

      // Enable/disable send button based on input
      document
        .getElementById("msgInput")
        .addEventListener("input", function () {
          document.getElementById("sendBtn").disabled =
            !this.value.trim() || isGenerating;
        });

      function handleKey(e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          if (!isGenerating && document.getElementById("msgInput").value.trim())
            send();
        }
      }

      function setGenerating(val) {
        isGenerating = val;
        const sendBtn = document.getElementById("sendBtn");
        const stopBtn = document.getElementById("stopBtn");
        const input = document.getElementById("msgInput");
        sendBtn.disabled = val;
        stopBtn.classList.toggle("visible", val);
        input.disabled = val;
        if (!val) {
          sendBtn.disabled = !input.value.trim();
          input.disabled = false;
        }
      }

      function stopGeneration() {
        setGenerating(false);
        hideTyping();
        appendMessage("ai", "[Generation stopped]");
      }

      function appendMessage(role, text) {
        removeEmptyState();
        const box = document.getElementById("chatBox");
        const isUser = role === "user";

        if (isUser) {
          const div = document.createElement("div");
          div.className = "msg-group";
          div.innerHTML = `
        <div class="msg-user">
          <div class="msg-user-bubble">${escapeHtml(text).replace(/\n/g, "<br>")}</div>
        </div>`;
          box.appendChild(div);
        } else {
          // Format markdown-ish response
          const formatted = formatResponse(text);
          const div = document.createElement("div");
          div.className = "msg-group";
          div.innerHTML = `
        <div class="msg-ai">
          <div class="ai-avatar">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-width="2" d="M12 2a10 10 0 100 20A10 10 0 0012 2zm0 0v20M2 12h20"/>
            </svg>
          </div>
          <div class="ai-content">
            <div class="ai-name">Vixy</div>
            <div class="ai-bubble">${formatted}</div>
            <div class="msg-actions">
              <button class="msg-action-btn" onclick="copyText(this)" data-text="${escapeHtml(text)}">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <rect x="9" y="9" width="13" height="13" rx="2" stroke-width="2"/>
                  <path stroke-width="2" d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
                </svg>
                Copy
              </button>
            </div>
          </div>
        </div>`;
          box.appendChild(div);
        }
        box.scrollTop = box.scrollHeight;
      }

      function formatResponse(text) {
        return escapeHtml(text)
          .replace(/```([\s\S]*?)```/g, "<pre><code>$1</code></pre>")
          .replace(/`([^`]+)`/g, "<code>$1</code>")
          .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
          .replace(/\*(.+?)\*/g, "<em>$1</em>")
          .replace(/\n/g, "<br>");
      }

      function copyText(btn) {
        const text = btn.getAttribute("data-text");
        navigator.clipboard.writeText(text).then(() => {
          btn.innerHTML = `
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <polyline stroke-width="2" points="20 6 9 17 4 12"/>
        </svg>
        Copied!`;
          setTimeout(() => {
            btn.innerHTML = `
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <rect x="9" y="9" width="13" height="13" rx="2" stroke-width="2"/>
            <path stroke-width="2" d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
          </svg>
          Copy`;
          }, 2000);
        });
      }

      function showTyping() {
        removeEmptyState();
        const box = document.getElementById("chatBox");
        const row = document.createElement("div");
        row.id = "typingRow";
        row.className = "typing-indicator";
        row.innerHTML = `
      <div class="ai-avatar">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-width="2" d="M12 2a10 10 0 100 20A10 10 0 0012 2zm0 0v20M2 12h20"/>
        </svg>
      </div>
      <div class="typing-dots">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>`;
        box.appendChild(row);
        box.scrollTop = box.scrollHeight;
      }

      function hideTyping() {
        document.getElementById("typingRow")?.remove();
      }

      async function send() {
        const input = document.getElementById("msgInput");
        const text = input.value.trim();
        if (!text || isGenerating) return;

        input.value = "";
        input.style.height = "auto";
        document.getElementById("sendBtn").disabled = true;

        appendMessage("user", text);
        chatHistory.push({ role: "user", text });
        showTyping();
        setGenerating(true);

        try {
          const authToken = localStorage.getItem("token");
          // Snapshot history BEFORE the current user message (already pushed above)
          // We send all previous turns so AI remembers the conversation context
          const historySnapshot = chatHistory.slice(0, -1); // exclude the just-pushed user msg
          const res = await fetch("/api/ai/chat", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              ...(authToken && { Authorization: `Bearer ${authToken}` }),
            },
            body: JSON.stringify({ message: text, history: historySnapshot }),
          });

          if (res.status === 401 || res.status === 403) {
            logout();
            return;
          }
          if (!res.ok) throw new Error(`HTTP ${res.status}`);

          const data = await res.json();
          const reply = data.reply || "No response from server.";

          hideTyping();
          appendMessage("ai", reply);
          chatHistory.push({ role: "ai", text: reply });

          // Save to Recent Chats only on the first message of a new session
          if (!sessionSaved) {
            saveSession(text);
            sessionSaved = true;
          } else {
            // Update existing session's messages
            updateSession();
          }
        } catch (err) {
          hideTyping();
          appendMessage(
            "ai",
            "⚠️ Could not reach the server. Please try again.",
          );
        } finally {
          setGenerating(false);
        }
      }

      function saveSession(firstMessage) {
        const sessions = JSON.parse(
          localStorage.getItem("vx_sessions") || "[]",
        );
        const title =
          firstMessage.length > 40
            ? firstMessage.slice(0, 40) + "…"
            : firstMessage;
        const id =
          "sess_" + Date.now() + "_" + Math.random().toString(36).slice(2, 7);
        currentSessionId = id;
        sessions.unshift({
          id,
          title,
          ts: Date.now(),
          messages: [...chatHistory],
        });
        localStorage.setItem(
          "vx_sessions",
          JSON.stringify(sessions.slice(0, 20)),
        );
        renderHistory();
      }

      function updateSession() {
        if (!currentSessionId) return;
        const sessions = JSON.parse(
          localStorage.getItem("vx_sessions") || "[]",
        );
        const idx = sessions.findIndex((s) => s.id === currentSessionId);
        if (idx !== -1) {
          sessions[idx].messages = [...chatHistory];
          localStorage.setItem("vx_sessions", JSON.stringify(sessions));
        }
      }

      function useSuggestion(text) {
        document.getElementById("msgInput").value = text;
        document.getElementById("sendBtn").disabled = false;
        send();
      }

      function newChat() {
        chatHistory = [];
        sessionSaved = false; // reset so next message creates a new session entry
        currentSessionId = null;
        const box = document.getElementById("chatBox");
        box.innerHTML = "";
        const empty = document.createElement("div");
        empty.id = "emptyState";
        empty.className = "empty-state";
        empty.innerHTML = `
      <div class="empty-logo">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-width="2" d="M12 2a10 10 0 100 20A10 10 0 0012 2zm0 0v20M2 12h20"/>
        </svg>
      </div>
      <h1 class="empty-title">How can I help you?</h1>
      <p class="empty-sub">Ask me anything — I'm Vixy, your AI assistant powered by Gemini.</p>
      <div class="suggestions-grid">
        <button class="suggestion-card" onclick="useSuggestion('Explain quantum computing in simple terms')">
          <span class="suggestion-icon"><i data-lucide="zap"></i></span>
          <div class="suggestion-title">Explain a concept</div>
          <div class="suggestion-desc">Explain quantum computing simply</div>
        </button>
        <button class="suggestion-card" onclick="useSuggestion('Help me write a professional email to my team')">
          <span class="suggestion-icon"><i data-lucide="pen-tool"></i></span>
          <div class="suggestion-title">Help me write</div>
          <div class="suggestion-desc">Draft a professional email</div>
        </button>
        <button class="suggestion-card" onclick="useSuggestion('Write a Python function to sort a list of dictionaries')">
          <span class="suggestion-icon"><i data-lucide="code"></i></span>
          <div class="suggestion-title">Code something</div>
          <div class="suggestion-desc">Python function to sort data</div>
        </button>
        <button class="suggestion-card" onclick="useSuggestion('What are the best productivity tips for developers?')">
          <span class="suggestion-icon">🚀</span>
          <div class="suggestion-title">Get advice</div>
          <div class="suggestion-desc">Productivity tips for developers</div>
        </button>
      </div>`;
        box.appendChild(empty);
      }

      function loadSession(i) {
        const sessions = JSON.parse(
          localStorage.getItem("vx_sessions") || "[]",
        );
        const session = sessions[i];
        if (!session) return;

        // Reset state
        chatHistory = [];
        currentSessionId = session.id;
        sessionSaved = true; // already saved, don't create duplicate

        // Clear chat box
        const box = document.getElementById("chatBox");
        box.innerHTML = "";

        // Restore messages
        const messages = session.messages || [];
        if (messages.length === 0) {
          // No messages stored, show empty
          newChat();
          return;
        }
        for (const msg of messages) {
          appendMessage(msg.role === "ai" ? "ai" : "user", msg.text);
          chatHistory.push({ role: msg.role, text: msg.text });
        }
      }

      function logout() {
        localStorage.removeItem("token");
        window.location.href = "/";
      }
    </script>
  </body>
</html>
