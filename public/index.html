<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta
      name="theme-color"
      content="#212121"
      media="(prefers-color-scheme: dark)"
    />
    <meta
      name="theme-color"
      content="#ffffff"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="description"
      content="Vixy-AI — Sign in to your AI assistant account"
    />
    <title>Vixy-AI — Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/auth.css" />
  </head>
  <body>
    <div class="auth-container">
      <!-- Logo -->
      <div class="auth-logo">
        <div class="logo-icon">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-width="2"
              d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"
            />
          </svg>
        </div>
        <span class="logo-text">Vixy-AI</span>
      </div>

      <!-- Auth card -->
      <div class="auth-card">
        <!-- Tab switcher -->
        <div class="tab-switcher" role="tablist">
          <button
            id="tabLogin"
            class="tab-btn active"
            role="tab"
            onclick="switchTab('login')"
          >
            Sign in
          </button>
          <button
            id="tabSignup"
            class="tab-btn"
            role="tab"
            onclick="switchTab('signup')"
          >
            Create account
          </button>
        </div>

        <!-- Login form -->
        <form
          id="formLogin"
          class="form active"
          onsubmit="return false;"
          novalidate
        >
          <div>
            <h1 class="form-title">Welcome back</h1>
            <p class="form-subtitle">Sign in to your account</p>
          </div>

          <div id="loginMsg" class="form-msg" role="alert"></div>

          <div class="field">
            <label for="li_email">Email</label>
            <div class="input-wrapper">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path
                  stroke-width="2"
                  d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"
                />
                <polyline stroke-width="2" points="22,6 12,13 2,6" />
              </svg>
              <input
                id="li_email"
                type="email"
                placeholder="you@mail.com"
                autocomplete="email"
                required
              />
            </div>
          </div>

          <div class="field">
            <label for="li_password">Password</label>
            <div class="input-wrapper">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <rect
                  x="3"
                  y="11"
                  width="18"
                  height="11"
                  rx="2"
                  stroke-width="2"
                />
                <path stroke-width="2" d="M7 11V7a5 5 0 0110 0v4" />
              </svg>
              <input
                id="li_password"
                type="password"
                placeholder="••••••••"
                autocomplete="current-password"
                required
              />
              <button
                type="button"
                class="pw-toggle"
                onclick="togglePassword('li_password', this)"
                aria-label="Toggle password visibility"
              >
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path
                    stroke-width="2"
                    d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"
                  />
                  <circle cx="12" cy="12" r="3" stroke-width="2" />
                </svg>
              </button>
            </div>
          </div>

          <button
            type="button"
            id="loginBtn"
            class="submit-btn"
            onclick="login()"
          >
            <span id="loginBtnText">Sign in</span>
            <div id="loginSpinner" class="spinner"></div>
          </button>
        </form>

        <!-- Signup form -->
        <form id="formSignup" class="form" onsubmit="return false;" novalidate>
          <div>
            <h1 class="form-title">Create an account</h1>
            <p class="form-subtitle">Start chatting with Vixy-AI for free</p>
          </div>

          <div id="signupMsg" class="form-msg" role="alert"></div>

          <div class="field">
            <label for="su_username">Username</label>
            <div class="input-wrapper">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path
                  stroke-width="2"
                  d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"
                />
                <circle cx="12" cy="7" r="4" stroke-width="2" />
              </svg>
              <input
                id="su_username"
                type="text"
                placeholder="Your name"
                autocomplete="name"
                required
              />
            </div>
          </div>

          <div class="field">
            <label for="su_email">Email</label>
            <div class="input-wrapper">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path
                  stroke-width="2"
                  d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"
                />
                <polyline stroke-width="2" points="22,6 12,13 2,6" />
              </svg>
              <input
                id="su_email"
                type="email"
                placeholder="you@mail.com"
                autocomplete="email"
                required
              />
            </div>
          </div>

          <div class="field">
            <label for="su_password">Password</label>
            <div class="input-wrapper">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <rect
                  x="3"
                  y="11"
                  width="18"
                  height="11"
                  rx="2"
                  stroke-width="2"
                />
                <path stroke-width="2" d="M7 11V7a5 5 0 0110 0v4" />
              </svg>
              <input
                id="su_password"
                type="password"
                placeholder="Min. 8 characters"
                autocomplete="new-password"
                oninput="checkStrength(this)"
                required
              />
              <button
                type="button"
                class="pw-toggle"
                onclick="togglePassword('su_password', this)"
                aria-label="Toggle password visibility"
              >
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path
                    stroke-width="2"
                    d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"
                  />
                  <circle cx="12" cy="12" r="3" stroke-width="2" />
                </svg>
              </button>
            </div>
            <div id="pwStrength" class="pw-strength">
              <div id="pwStrengthBar" class="pw-strength-bar"></div>
            </div>
            <div id="pwHint" class="pw-hint"></div>
          </div>

          <button
            type="button"
            id="signupBtn"
            class="submit-btn"
            onclick="signup()"
          >
            <span id="signupBtnText">Create account</span>
            <div id="signupSpinner" class="spinner"></div>
          </button>
        </form>
      </div>

      <div class="auth-footer">
        By continuing, you agree to our Terms of Service and Privacy Policy.
      </div>
    </div>

    <script src="/js/auth.js"></script>
  </body>
</html>
