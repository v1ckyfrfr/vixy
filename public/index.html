<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Vixy-AI — Sign in to your AI assistant account"
    />
    <title>Vixy-AI — Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --accent: #10a37f;
        --accent-dim: #0d8f70;
        --accent-glow: rgba(16, 163, 127, 0.2);
        --bg: #212121;
        --surface: #2f2f2f;
        --surface-2: #3a3a3a;
        --text: #ececec;
        --text-dim: #b4b4b4;
        --text-muted: #6b6b6b;
        --border: rgba(255, 255, 255, 0.1);
        --border-subtle: rgba(255, 255, 255, 0.06);
        --radius-sm: 8px;
        --radius: 12px;
        --font-sans: "Inter", -apple-system, sans-serif;
      }

      html {
        color-scheme: dark;
      }

      body {
        font-family: var(--font-sans);
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        -webkit-font-smoothing: antialiased;
      }

      /* Background subtle pattern */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(
            circle at 20% 80%,
            rgba(16, 163, 127, 0.04) 0%,
            transparent 50%
          ),
          radial-gradient(
            circle at 80% 20%,
            rgba(16, 163, 127, 0.03) 0%,
            transparent 50%
          );
        pointer-events: none;
        z-index: 0;
      }

      .auth-container {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 400px;
      }

      /* Logo */
      .auth-logo {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-bottom: 32px;
      }

      .logo-icon {
        width: 36px;
        height: 36px;
        background: var(--accent);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .logo-icon svg {
        width: 20px;
        height: 20px;
        color: #fff;
      }

      .logo-text {
        font-size: 1.25rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        color: var(--text);
      }

      /* Card */
      .auth-card {
        background: var(--surface);
        border: 1px solid var(--border-subtle);
        border-radius: 16px;
        padding: 32px;
        box-shadow: 0 8px 40px rgba(0, 0, 0, 0.3);
      }

      /* Tab switcher */
      .tab-switcher {
        display: flex;
        background: rgba(0, 0, 0, 0.2);
        border-radius: var(--radius-sm);
        padding: 3px;
        margin-bottom: 28px;
      }

      .tab-btn {
        flex: 1;
        padding: 8px;
        background: transparent;
        border: none;
        border-radius: 6px;
        font-family: var(--font-sans);
        font-size: 0.875rem;
        font-weight: 500;
        color: var(--text-muted);
        cursor: pointer;
        transition: all 0.2s;
      }

      .tab-btn.active {
        background: var(--surface-2);
        color: var(--text);
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
      }

      /* Form */
      .form {
        display: none;
        flex-direction: column;
        gap: 14px;
      }
      .form.active {
        display: flex;
      }

      .form-title {
        font-size: 1.25rem;
        font-weight: 600;
        letter-spacing: -0.02em;
        margin-bottom: 4px;
        text-align: center;
      }

      .form-subtitle {
        font-size: 0.82rem;
        color: var(--text-muted);
        text-align: center;
        margin-bottom: 8px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      label {
        font-size: 0.8rem;
        font-weight: 500;
        color: var(--text-dim);
      }

      .input-wrapper {
        position: relative;
      }

      .input-wrapper svg {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        width: 15px;
        height: 15px;
        color: var(--text-muted);
        pointer-events: none;
      }

      input {
        width: 100%;
        padding: 10px 14px 10px 38px;
        background: rgba(0, 0, 0, 0.2);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        color: var(--text);
        font-family: var(--font-sans);
        font-size: 0.875rem;
        outline: none;
        transition:
          border-color 0.15s,
          box-shadow 0.15s;
      }

      input::placeholder {
        color: var(--text-muted);
      }

      input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-glow);
      }

      /* Password visibility toggle */
      .pw-toggle {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        color: var(--text-muted);
        padding: 0;
        display: flex;
        align-items: center;
        transition: color 0.15s;
      }

      .pw-toggle:hover {
        color: var(--text-dim);
      }
      .pw-toggle svg {
        width: 15px;
        height: 15px;
      }

      /* Submit button */
      .submit-btn {
        width: 100%;
        padding: 11px;
        background: var(--accent);
        border: none;
        border-radius: var(--radius-sm);
        color: #fff;
        font-family: var(--font-sans);
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        transition:
          background 0.15s,
          transform 0.1s;
        margin-top: 4px;
        letter-spacing: -0.01em;
      }

      .submit-btn:hover {
        background: var(--accent-dim);
      }
      .submit-btn:active {
        transform: scale(0.99);
      }
      .submit-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      /* Error / success message */
      .form-msg {
        padding: 10px 14px;
        border-radius: var(--radius-sm);
        font-size: 0.82rem;
        display: none;
        align-items: center;
        gap: 8px;
      }

      .form-msg.error {
        display: flex;
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.2);
        color: #f87171;
      }

      .form-msg.success {
        display: flex;
        background: rgba(16, 163, 127, 0.1);
        border: 1px solid rgba(16, 163, 127, 0.2);
        color: var(--accent);
      }

      .form-msg svg {
        width: 14px;
        height: 14px;
        flex-shrink: 0;
      }

      /* Password strength bar */
      .pw-strength {
        height: 3px;
        border-radius: 2px;
        background: var(--border);
        overflow: hidden;
        margin-top: 4px;
        display: none;
      }

      .pw-strength.visible {
        display: block;
      }

      .pw-strength-bar {
        height: 100%;
        border-radius: 2px;
        transition:
          width 0.3s,
          background 0.3s;
        width: 0%;
      }

      .pw-hint {
        font-size: 0.72rem;
        color: var(--text-muted);
        margin-top: 2px;
      }

      /* Divider */
      .or-divider {
        display: flex;
        align-items: center;
        gap: 12px;
        color: var(--text-muted);
        font-size: 0.75rem;
      }

      .or-divider::before,
      .or-divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border-subtle);
      }

      /* Footer */
      .auth-footer {
        text-align: center;
        margin-top: 24px;
        font-size: 0.78rem;
        color: var(--text-muted);
      }

      /* Loading spinner on button */
      .spinner {
        width: 16px;
        height: 16px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        display: none;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="auth-container">
      <!-- Logo -->
      <div class="auth-logo">
        <div class="logo-icon">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-width="2"
              d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"
            />
          </svg>
        </div>
        <span class="logo-text">Vixy-AI</span>
      </div>

      <!-- Auth card -->
      <div class="auth-card">
        <!-- Tab switcher -->
        <div class="tab-switcher" role="tablist">
          <button
            id="tabLogin"
            class="tab-btn active"
            role="tab"
            onclick="switchTab('login')"
          >
            Sign in
          </button>
          <button
            id="tabSignup"
            class="tab-btn"
            role="tab"
            onclick="switchTab('signup')"
          >
            Create account
          </button>
        </div>

        <!-- Login form -->
        <form
          id="formLogin"
          class="form active"
          onsubmit="return false;"
          novalidate
        >
          <div>
            <h1 class="form-title">Welcome back</h1>
            <p class="form-subtitle">Sign in to your Vixy-AI account</p>
          </div>

          <div id="loginMsg" class="form-msg" role="alert"></div>

          <div class="field">
            <label for="li_email">Email</label>
            <div class="input-wrapper">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path
                  stroke-width="2"
                  d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"
                />
                <polyline stroke-width="2" points="22,6 12,13 2,6" />
              </svg>
              <input
                id="li_email"
                type="email"
                placeholder="you@example.com"
                autocomplete="email"
                required
              />
            </div>
          </div>

          <div class="field">
            <label for="li_password">Password</label>
            <div class="input-wrapper">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <rect
                  x="3"
                  y="11"
                  width="18"
                  height="11"
                  rx="2"
                  stroke-width="2"
                />
                <path stroke-width="2" d="M7 11V7a5 5 0 0110 0v4" />
              </svg>
              <input
                id="li_password"
                type="password"
                placeholder="••••••••"
                autocomplete="current-password"
                required
              />
              <button
                type="button"
                class="pw-toggle"
                onclick="togglePassword('li_password', this)"
                aria-label="Toggle password visibility"
              >
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path
                    stroke-width="2"
                    d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"
                  />
                  <circle cx="12" cy="12" r="3" stroke-width="2" />
                </svg>
              </button>
            </div>
          </div>

          <button
            type="button"
            id="loginBtn"
            class="submit-btn"
            onclick="login()"
          >
            <span id="loginBtnText">Sign in</span>
            <div id="loginSpinner" class="spinner"></div>
          </button>
        </form>

        <!-- Signup form -->
        <form id="formSignup" class="form" onsubmit="return false;" novalidate>
          <div>
            <h1 class="form-title">Create an account</h1>
            <p class="form-subtitle">Start chatting with Vixy-AI for free</p>
          </div>

          <div id="signupMsg" class="form-msg" role="alert"></div>

          <div class="field">
            <label for="su_username">Username</label>
            <div class="input-wrapper">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path
                  stroke-width="2"
                  d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"
                />
                <circle cx="12" cy="7" r="4" stroke-width="2" />
              </svg>
              <input
                id="su_username"
                type="text"
                placeholder="Your name"
                autocomplete="name"
                required
              />
            </div>
          </div>

          <div class="field">
            <label for="su_email">Email</label>
            <div class="input-wrapper">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path
                  stroke-width="2"
                  d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"
                />
                <polyline stroke-width="2" points="22,6 12,13 2,6" />
              </svg>
              <input
                id="su_email"
                type="email"
                placeholder="you@example.com"
                autocomplete="email"
                required
              />
            </div>
          </div>

          <div class="field">
            <label for="su_password">Password</label>
            <div class="input-wrapper">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <rect
                  x="3"
                  y="11"
                  width="18"
                  height="11"
                  rx="2"
                  stroke-width="2"
                />
                <path stroke-width="2" d="M7 11V7a5 5 0 0110 0v4" />
              </svg>
              <input
                id="su_password"
                type="password"
                placeholder="Min. 8 characters"
                autocomplete="new-password"
                oninput="checkStrength(this)"
                required
              />
              <button
                type="button"
                class="pw-toggle"
                onclick="togglePassword('su_password', this)"
                aria-label="Toggle password visibility"
              >
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path
                    stroke-width="2"
                    d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"
                  />
                  <circle cx="12" cy="12" r="3" stroke-width="2" />
                </svg>
              </button>
            </div>
            <div id="pwStrength" class="pw-strength">
              <div id="pwStrengthBar" class="pw-strength-bar"></div>
            </div>
            <div id="pwHint" class="pw-hint"></div>
          </div>

          <button
            type="button"
            id="signupBtn"
            class="submit-btn"
            onclick="signup()"
          >
            <span id="signupBtnText">Create account</span>
            <div id="signupSpinner" class="spinner"></div>
          </button>
        </form>
      </div>

      <div class="auth-footer">
        By continuing, you agree to our Terms of Service and Privacy Policy.
      </div>
    </div>

    <script>
      (function () {
        const token = localStorage.getItem("token");
        if (token) window.location.href = "/dashboard.html";
      })();

      function switchTab(tab) {
        const isLogin = tab === "login";
        document.getElementById("tabLogin").classList.toggle("active", isLogin);
        document
          .getElementById("tabSignup")
          .classList.toggle("active", !isLogin);
        document
          .getElementById("formLogin")
          .classList.toggle("active", isLogin);
        document
          .getElementById("formSignup")
          .classList.toggle("active", !isLogin);
        clearMessages();
      }

      function clearMessages() {
        ["loginMsg", "signupMsg"].forEach((id) => {
          const el = document.getElementById(id);
          el.className = "form-msg";
          el.innerHTML = "";
        });
      }

      function showMsg(id, text, type) {
        const el = document.getElementById(id);
        const icon =
          type === "error"
            ? '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke-width="2"/><line x1="12" y1="8" x2="12" y2="12" stroke-width="2"/><line x1="12" y1="16" x2="12.01" y2="16" stroke-width="2"/></svg>'
            : '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline stroke-width="2" points="22 4 12 14.01 9 11.01"/></svg>';
        el.className = `form-msg ${type}`;
        el.innerHTML = icon + "<span>" + text + "</span>";
      }

      function togglePassword(id, btn) {
        const input = document.getElementById(id);
        const isPassword = input.type === "password";
        input.type = isPassword ? "text" : "password";
        btn.innerHTML = isPassword
          ? '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23" stroke-width="2"/></svg>'
          : '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3" stroke-width="2"/></svg>';
      }

      function checkStrength(input) {
        const pw = input.value;
        const bar = document.getElementById("pwStrengthBar");
        const hint = document.getElementById("pwHint");
        const container = document.getElementById("pwStrength");

        if (!pw) {
          container.classList.remove("visible");
          hint.textContent = "";
          return;
        }

        container.classList.add("visible");

        let score = 0;
        if (pw.length >= 8) score++;
        if (pw.length >= 12) score++;
        if (/[A-Z]/.test(pw)) score++;
        if (/[0-9]/.test(pw)) score++;
        if (/[^A-Za-z0-9]/.test(pw)) score++;

        const levels = [
          { label: "Too short", color: "#ef4444", width: "20%" },
          { label: "Weak", color: "#f97316", width: "40%" },
          { label: "Fair", color: "#eab308", width: "60%" },
          { label: "Good", color: "#22c55e", width: "80%" },
          { label: "Strong", color: "#10a37f", width: "100%" },
        ];

        const lvl = levels[Math.min(score, 4)];
        bar.style.width = lvl.width;
        bar.style.background = lvl.color;
        hint.textContent = lvl.label;
        hint.style.color = lvl.color;
      }

      function setLoading(prefix, loading) {
        const btn = document.getElementById(prefix + "Btn");
        const txt = document.getElementById(prefix + "BtnText");
        const spinner = document.getElementById(prefix + "Spinner");
        btn.disabled = loading;
        txt.style.display = loading ? "none" : "inline";
        spinner.style.display = loading ? "block" : "none";
      }

      async function signup() {
        const username = document.getElementById("su_username").value.trim();
        const email = document.getElementById("su_email").value.trim();
        const password = document.getElementById("su_password").value;

        if (!username || !email || !password) {
          return showMsg("signupMsg", "Please fill in all fields.", "error");
        }
        if (password.length < 8) {
          return showMsg(
            "signupMsg",
            "Password must be at least 8 characters.",
            "error",
          );
        }

        setLoading("signup", true);

        try {
          const res = await fetch("/api/auth/signup", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, email, password }),
          });

          const data = await res.json();

          if (!res.ok) {
            showMsg(
              "signupMsg",
              data.message || "Signup failed. Please try again.",
              "error",
            );
          } else {
            showMsg(
              "signupMsg",
              "Account created! You can now sign in.",
              "success",
            );
            document.getElementById("su_username").value = "";
            document.getElementById("su_email").value = "";
            document.getElementById("su_password").value = "";
            setTimeout(() => switchTab("login"), 1800);
          }
        } catch (err) {
          showMsg("signupMsg", "Network error. Please try again.", "error");
        } finally {
          setLoading("signup", false);
        }
      }

      async function login() {
        const email = document.getElementById("li_email").value.trim();
        const password = document.getElementById("li_password").value;

        if (!email || !password) {
          return showMsg("loginMsg", "Please fill in all fields.", "error");
        }

        setLoading("login", true);

        try {
          const res = await fetch("/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          });

          const data = await res.json();

          if (!res.ok) {
            showMsg(
              "loginMsg",
              data.message || "Invalid credentials.",
              "error",
            );
            setLoading("login", false);
            return;
          }

          // Store token in localStorage so it persists across tabs and refreshes
          localStorage.setItem("token", data.token);
          window.location.href = "/dashboard.html";
        } catch (err) {
          showMsg("loginMsg", "Network error. Please try again.", "error");
          setLoading("login", false);
        }
      }

      // Allow Enter key to submit
      document.addEventListener("keydown", function (e) {
        if (e.key !== "Enter") return;
        const loginActive = document
          .getElementById("formLogin")
          .classList.contains("active");
        if (loginActive) login();
        else signup();
      });
    </script>
  </body>
</html>
